<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jayesh Bhadange — DevOps & Cloud Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #080c10;
  --surface: #0d1117;
  --card: #111820;
  --border: #1e2d3d;
  --accent: #00d4aa;
  --accent2: #0098ff;
  --accent3: #7c3aed;
  --text: #e2e8f0;
  --muted: #64748b;
  --mono: 'Space Mono', monospace;
  --sans: 'Syne', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.6;
  overflow-x: hidden;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 0 clamp(1.5rem, 5vw, 4rem);
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  background: rgba(8, 12, 16, 0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  font-family: var(--mono);
  font-size: 0.9rem;
  color: var(--accent);
}

.nav-links {
  display: flex;
  gap: 2.5rem;
  list-style: none;
}

.nav-links a {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--muted);
  text-decoration: none;
  text-transform: uppercase;
}

/* HERO */
#home {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 70px 10%;
  position: relative;
}

.hero-name {
  font-size: clamp(3.5rem, 9vw, 8rem);
  font-weight: 800;
  line-height: 0.95;
  letter-spacing: -0.03em;
  margin-bottom: 1.5rem;
}

.hero-name .line-accent {
  display: block;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero-desc {
  max-width: 520px;
  color: var(--muted);
  margin-bottom: 2rem;
}

/* ✅ UPDATED TERMINAL */
.terminal {
  position: absolute;
  right: 5rem;
  top: 65%;              /* moved lower */
  transform: translateY(-50%);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 300px;          /* smaller */
  font-family: var(--mono);
  font-size: 0.7rem;     /* smaller text */
  overflow: hidden;
  display: none;
}

@media (min-width: 1000px) {
  .terminal { display: block; }
}

.terminal-bar {
  background: var(--surface);
  padding: 0.7rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  border-bottom: 1px solid var(--border);
}

.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-r { background: #ff5f56; }
.dot-y { background: #ffbd2e; }
.dot-g { background: #27c93f; }

.terminal-body { padding: 1.2rem; }

/* SECTION */
section {
  padding: 6rem 10%;
}

footer {
  text-align: center;
  padding: 2rem;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--muted);
}
</style>
</head>

<body>

<nav>
  <div class="nav-logo">JB.dev</div>
  <ul class="nav-links">
    <li><a href="#home">Home</a></li>
  </ul>
</nav>

<section id="home">
  <h1 class="hero-name">
    Jayesh<br>
    <span class="line-accent">Bhadange</span>
  </h1>
  <p class="hero-desc">
    Cloud Engineer & DevOps Enthusiast building scalable infrastructure and automation systems.
  </p>

  <!-- Terminal -->
  <div class="terminal">
    <div class="terminal-bar">
      <span class="dot dot-r"></span>
      <span class="dot dot-y"></span>
      <span class="dot dot-g"></span>
    </div>
    <div class="terminal-body">
      <div># whoami</div>
      <div>jayesh_bhadange</div>
      <div># cat profile.json</div>
      <div>{</div>
      <div> "role": "DevOps Engineer",</div>
      <div> "focus": "Cloud & Automation"</div>
      <div>}</div>
    </div>
  </div>
</section>

<footer>
  © 2026 Jayesh Bhadange — Future Advanced DevOps Engineer
</footer>

</body>
</html>
